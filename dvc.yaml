stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/diabetes.csv
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/train.csv
      - params.yaml
    outs:
      - models/model.pkl

  validate:
    cmd: python src/validate.py
    deps:
      - src/validate.py
      - models/model.pkl
      - data/processed/test.csv
    metrics:
      - metrics/metrics.json
    plots:
      - plots/confusion_matrix.png